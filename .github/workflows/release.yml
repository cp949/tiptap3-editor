name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract release notes from CHANGELOG
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="$(mktemp)"

          awk -v version="$version" '
            $0 ~ "^## " version "([[:space:]]|$)" { in_section=1; next }
            in_section && $0 ~ "^## " { exit }
            in_section { print }
          ' CHANGELOG.md | sed '/./,$!d' > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            {
              echo "Release ${tag}"
              echo
              echo "No matching section was found in CHANGELOG.md."
            } > "$notes_file"
          fi

          {
            echo "body<<EOF"
            cat "$notes_file"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
